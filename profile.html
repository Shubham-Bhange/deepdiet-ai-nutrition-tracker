<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>DeepDiet - Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="nav">
      <div class="brand"><div class="brand-badge">D</div>DeepDiet</div>

      <div class="nav-right">
        <a href="index.html">Scan</a>
        <a href="history.html">History</a>
        <a href="dashboard.html">Dashboard</a>
        <a class="active" href="profile.html">Profile</a>

        <select id="langSelect">
          <option value="en">English</option>
          <option value="hi">Hindi</option>
          <option value="te">Telugu</option>
        </select>

        <span class="badge">User: <span id="userInfo">--</span></span>
        <button class="btn secondary" id="logoutBtn" type="button">Logout</button>
      </div>
    </div>

    <div class="grid grid-2">
      <div class="card">
        <h1 class="h1">User Profile</h1>
        <p class="p">Enter your details to calculate BMI & recommended calories.</p>

        <div style="margin-top:14px;display:grid;gap:12px;">
          <input id="p_name" class="input" placeholder="Full Name">
          <input id="p_age" class="input" type="number" placeholder="Age">
          <select id="p_gender">
            <option value="male">Male</option>
            <option value="female">Female</option>
          </select>
          <input id="p_height" class="input" type="number" placeholder="Height (cm)">
          <input id="p_weight" class="input" type="number" placeholder="Weight (kg)">
          <select id="p_activity">
            <option value="sedentary">Sedentary (little exercise)</option>
            <option value="light">Light (1-3 days/week)</option>
            <option value="moderate">Moderate (3-5 days/week)</option>
            <option value="active">Active (6-7 days/week)</option>
            <option value="very_active">Very Active (athlete)</option>
          </select>

          <button id="saveProfileBtn" class="btn" type="button">Save Profile</button>
          <button id="applyGoalBtn" class="btn secondary" type="button">Set Recommended Calories as Goal</button>
        </div>
      </div>

      <div class="card">
        <h1 class="h1">Health Summary</h1>
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;">
          <span class="badge" id="bmiBadge">BMI: --</span>
          <span class="badge" id="bmiCat">Category: --</span>
        </div>

        <div class="kpi">
          <div class="box"><div class="val" id="recCal">--</div><div class="lbl">Recommended Calories/day</div></div>
          <div class="box"><div class="val" id="recP">--</div><div class="lbl">Protein (g/day)</div></div>
          <div class="box"><div class="val" id="recC">--</div><div class="lbl">Carbs (g/day)</div></div>
          <div class="box"><div class="val" id="recF">--</div><div class="lbl">Fat (g/day)</div></div>
        </div>
      </div>
    </div>
  </div>

  <div id="toastBox" style="position:fixed; bottom:18px; right:18px; z-index:9999; display:flex; flex-direction:column; gap:10px; max-width:320px;"></div>

  <script src="config.js"></script>
  <script src="toast.js"></script>
  <script src="auth.js"></script>
  <script src="i18n.js"></script>
  <script src="health.js"></script>
  <script src="profile.js"></script>
</body>
</html>
