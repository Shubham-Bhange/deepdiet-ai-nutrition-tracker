<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>DeepDiet - Login</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <!-- NAVBAR -->
    <div class="nav">
      <div class="brand">
        <div class="brand-badge">D</div>
        DeepDiet
      </div>
      <div class="nav-right">
        <a class="active" href="login.html">Login</a>
        <a href="register.html">Register</a>
      </div>
    </div>

    <!-- LOGIN CARD -->
    <div class="card" style="max-width:560px;margin:0 auto;">
      <h1 class="h1">Login</h1>
      <p class="p">Login to track your meals and nutrition.</p>

      <div style="margin-top:18px;display:grid;gap:14px;">

        <div>
          <label class="p"><b>User ID</b></label>
          <input id="userId" class="input" placeholder="Enter your user ID">
        </div>

        <div>
          <label class="p"><b>Password</b></label>
          <input id="password" type="password" class="input" placeholder="Enter your password">
        </div>

        <button id="loginBtn" class="btn" type="button">
          Login
        </button>

        <p class="p" style="margin:0;">
          New user?
          <a href="register.html" style="color:#bfdbfe;">Create account</a>
        </p>

      </div>
    </div>

  </div>

  <!-- TOAST CONTAINER -->
  <div id="toastBox"
       style="position:fixed;
              bottom:18px;
              right:18px;
              z-index:9999;
              display:flex;
              flex-direction:column;
              gap:10px;
              max-width:320px;">
  </div>

  <!-- SCRIPTS -->
  <script src="toast.js"></script>

  <script>
    const API_BASE = "https://deepdiet-backend.onrender.com";

    document.getElementById("loginBtn").addEventListener("click", async () => {

      const userId = document.getElementById("userId").value.trim();
      const password = document.getElementById("password").value;

      if (!userId || !password) {
        showToast("Enter User ID and Password", "error");
        return;
      }

      try {
        const response = await fetch(`${API_BASE}/api/login`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            userId: userId,
            password: password
          })
        });

        const data = await response.json();

        if (!data.ok) {
          showToast(data.msg || "Invalid credentials", "error");
          return;
        }

        // Store JWT and name
        localStorage.setItem("token", data.token);
        localStorage.setItem("fullName", data.fullName);

        showToast("Login successful ✅", "success");

        setTimeout(() => {
          window.location.href = "index.html";
        }, 700);

      } catch (error) {
        console.error("Login error:", error);
        showToast("Server error. Please try again.", "error");
      }

    });
  </script>

</body>
</html>
